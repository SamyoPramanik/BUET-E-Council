events {
    worker_connections 1024;
}

http {
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    server {
        listen 80;
        server_name localhost;

        # Forward headers correctly for client requests
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location / {
            proxy_pass http://frontend:3000;
        }

        location /api/ {
            proxy_pass http://backend:8000/;
        }

        location /admin/ {
            proxy_pass http://backend:8000/admin/;
        }

        location /buet-api/department-head/ {
            proxy_pass https://regoffice.buet.ac.bd/filetracker/my-php-api/api/Dean_Head.php/;
            proxy_set_header Host regoffice.buet.ac.bd;
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 256 16k;
        }

        location /buet-api/users/ {
            proxy_pass https://regoffice.buet.ac.bd/filetracker/my-php-api/api/users.php/;
            proxy_set_header Host regoffice.buet.ac.bd;
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 256 16k;
        }
    }
}