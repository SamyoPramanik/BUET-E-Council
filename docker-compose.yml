services:
  db:
    image: docker.io/ankane/pgvector:latest
    container_name: ecouncil_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: buet_admin_pass
      POSTGRES_DB: ecouncil_db
    # ports:
    #   - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d ecouncil_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    container_name: ecouncil_api
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql://admin:buet_admin_pass@db:5432/ecouncil_db
      SECRET_KEY: your_super_secret_buet_key

    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:8000/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${BACKEND_URL}/api
        VITE_API_INTERNAL_URL: http://backend:8000
    container_name: ecouncil_ui
    # ports:
    #   - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider -q http://localhost:3000 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: ecouncil_nginx
    restart: always
    ports:
      - "9001:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy

volumes:
  pgdata:
